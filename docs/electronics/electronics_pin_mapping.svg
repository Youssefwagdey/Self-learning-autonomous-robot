<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles and markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="powerarrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#d00" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#333">
    🔌 Electronics Pin Mapping (Full Setup)
  </text>
  
  <!-- ====== ESP32 SECTION ====== -->
  <rect x="50" y="80" width="350" height="280" fill="#fff5f5" stroke="#f96" stroke-width="3" rx="10"/>
  <text x="225" y="110" font-size="20" font-weight="bold" text-anchor="middle" fill="#f96">
    🧠 ESP32 (Brain - Sensors &amp; Decision Making)
  </text>
  
  <!-- ESP32 Chip -->
  <rect x="140" y="130" width="170" height="120" fill="#f96" stroke="#333" stroke-width="2" rx="5"/>
  <text x="225" y="165" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">ESP32</text>
  <text x="225" y="185" font-size="12" text-anchor="middle" fill="#fff">Decision Maker</text>
  
  <!-- ESP32 Pins -->
  <text x="150" y="210" font-size="11" fill="#fff">RX2 (16)</text>
  <text x="150" y="225" font-size="11" fill="#fff">TX2 (17)</text>
  <text x="150" y="240" font-size="11" fill="#fff">TX0 (1)</text>
  
  <!-- Pin Labels Table -->
  <text x="70" y="280" font-size="12" font-weight="bold" fill="#333">Pin Mapping:</text>
  <text x="70" y="300" font-size="11" fill="#333">• RX2 (GPIO 16) ← LiDAR Data In</text>
  <text x="70" y="318" font-size="11" fill="#333">• TX2 (GPIO 17) → LiDAR Control</text>
  <text x="70" y="336" font-size="11" fill="#333">• TX0 (GPIO 1) → Serial to Mega</text>
  
  <!-- ====== LIDAR SENSOR ====== -->
  <rect x="480" y="120" width="180" height="80" fill="#dfd" stroke="#333" stroke-width="2" rx="5"/>
  <text x="570" y="150" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">LiDAR Sensor</text>
  <text x="570" y="170" font-size="11" text-anchor="middle" fill="#555">Distance Mapping</text>
  <text x="490" y="190" font-size="10" fill="#333">RX ← TX2(17)</text>
  <text x="490" y="203" font-size="10" fill="#333">TX → RX2(16)</text>
  
  <!-- ESP32 to LiDAR connections -->
  <path d="M 310 210 L 480 165" stroke="#4a90e2" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="380" y="180" font-size="10" fill="#4a90e2">TX2→RX</text>
  <path d="M 480 180 L 310 220" stroke="#4a90e2" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="380" y="210" font-size="10" fill="#4a90e2">TX→RX2</text>
  
  <!-- ====== SERIAL COMMUNICATION ====== -->
  <rect x="420" y="320" width="200" height="80" fill="#ffe" stroke="#f90" stroke-width="2" rx="10"/>
  <text x="520" y="350" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Serial Communication</text>
  <text x="520" y="370" font-size="11" text-anchor="middle" fill="#555">UART (9600 baud)</text>
  <text x="430" y="390" font-size="10" fill="#333">ESP32 TX0(1) → Mega RX0(0)</text>
  
  <!-- ESP32 to Serial -->
  <path d="M 225 250 L 225 300 L 420 360" stroke="#f90" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="280" y="290" font-size="11" fill="#f90">Commands</text>
  
  <!-- ====== ARDUINO MEGA SECTION ====== -->
  <rect x="50" y="440" width="450" height="380" fill="#f0f8ff" stroke="#69f" stroke-width="3" rx="10"/>
  <text x="275" y="470" font-size="20" font-weight="bold" text-anchor="middle" fill="#69f">
    🦾 Arduino Mega (Muscle - Actuators &amp; Motor Control)
  </text>
  
  <!-- Arduino Mega Chip -->
  <rect x="120" y="490" width="190" height="130" fill="#69f" stroke="#333" stroke-width="2" rx="5"/>
  <text x="215" y="520" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">Arduino Mega</text>
  <text x="215" y="540" font-size="12" text-anchor="middle" fill="#fff">Motor Controller</text>
  
  <!-- Mega Pins -->
  <text x="130" y="565" font-size="10" fill="#fff">RX0(0) D2-D5</text>
  <text x="130" y="580" font-size="10" fill="#fff">D7,D8 D9,D10</text>
  
  <!-- Serial to Mega -->
  <path d="M 620 360 L 700 360 L 700 530 L 310 530" stroke="#f90" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Pin Mapping Table for Mega -->
  <text x="70" y="650" font-size="12" font-weight="bold" fill="#333">Pin Mapping:</text>
  <text x="70" y="670" font-size="10" fill="#333">• RX0 (Pin 0) ← Commands from ESP32</text>
  <text x="70" y="688" font-size="10" fill="#333">• D7/D8 → Ultrasonic (Trig/Echo)</text>
  <text x="70" y="706" font-size="10" fill="#333">• D5/D4 → Motor Driver IN1/IN2 (Left)</text>
  <text x="70" y="724" font-size="10" fill="#333">• D3/D2 → Motor Driver IN3/IN4 (Right)</text>
  <text x="70" y="742" font-size="10" fill="#333">• D10 (PWM) → ENA (Left Speed)</text>
  <text x="70" y="760" font-size="10" fill="#333">• D9 (PWM) → ENB (Right Speed)</text>
  <text x="70" y="778" font-size="10" fill="#333">• D7 → Ultrasonic Trig (Front)</text>
  <text x="70" y="796" font-size="10" fill="#333">• D8 → Ultrasonic Echo (Front)</text>
  
  <!-- ====== ULTRASONIC SENSOR ====== -->
  <rect x="340" y="500" width="140" height="70" fill="#fff" stroke="#333" stroke-width="2" rx="5"/>
  <text x="410" y="525" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Ultrasonic</text>
  <text x="410" y="542" font-size="10" text-anchor="middle" fill="#555">(Front Obstacle)</text>
  <text x="350" y="560" font-size="9" fill="#333">Trig←D7 Echo→D8</text>
  
  <!-- Mega to Ultrasonic -->
  <path d="M 310 540 L 340 535" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- ====== MOTOR DRIVER L298N ====== -->
  <rect x="560" y="500" width="200" height="140" fill="#ffd" stroke="#333" stroke-width="2" rx="5"/>
  <text x="660" y="525" font-size="15" font-weight="bold" text-anchor="middle" fill="#333">Motor Driver L298N</text>
  <text x="570" y="550" font-size="10" fill="#333">IN1 ← D5 (Left Fwd)</text>
  <text x="570" y="565" font-size="10" fill="#333">IN2 ← D4 (Left Back)</text>
  <text x="570" y="580" font-size="10" fill="#333">IN3 ← D3 (Right Fwd)</text>
  <text x="570" y="595" font-size="10" fill="#333">IN4 ← D2 (Right Back)</text>
  <text x="570" y="610" font-size="10" fill="#333">ENA ← D10 (PWM)</text>
  <text x="570" y="625" font-size="10" fill="#333">ENB ← D9 (PWM)</text>
  
  <!-- Mega to Motor Driver -->
  <path d="M 310 570 L 560 570" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="410" y="565" font-size="10" fill="#333">Control Signals</text>
  
  <!-- ====== MOTORS ====== -->
  <rect x="820" y="490" width="150" height="60" fill="#eee" stroke="#333" stroke-width="2" rx="5"/>
  <text x="895" y="520" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">DC Motor Left</text>
  <text x="895" y="538" font-size="10" text-anchor="middle" fill="#555">12V</text>
  
  <rect x="820" y="570" width="150" height="60" fill="#eee" stroke="#333" stroke-width="2" rx="5"/>
  <text x="895" y="600" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">DC Motor Right</text>
  <text x="895" y="618" font-size="10" text-anchor="middle" fill="#555">12V</text>
  
  <!-- Motor Driver to Motors -->
  <path d="M 760 540 L 820 520" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 760 590 L 820 600" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- ====== POWER SECTION ====== -->
  <rect x="820" y="100" width="340" height="320" fill="#ffe0e0" stroke="#d00" stroke-width="3" rx="10"/>
  <text x="990" y="130" font-size="20" font-weight="bold" text-anchor="middle" fill="#d00">
    🔋 Power Distribution
  </text>
  
  <!-- Battery -->
  <rect x="860" y="150" width="120" height="80" fill="#ff6b6b" stroke="#333" stroke-width="2" rx="5"/>
  <text x="920" y="180" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">Battery</text>
  <text x="920" y="200" font-size="13" text-anchor="middle" fill="#fff">12V</text>
  <text x="920" y="218" font-size="11" text-anchor="middle" fill="#fff">LiPo/Li-ion</text>
  
  <!-- Step Down Converter -->
  <rect x="1020" y="160" width="120" height="60" fill="#4ecdc4" stroke="#333" stroke-width="2" rx="5"/>
  <text x="1080" y="185" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Step-Down</text>
  <text x="1080" y="205" font-size="11" text-anchor="middle" fill="#fff">12V → 5V</text>
  
  <!-- Power connections -->
  <path d="M 980 190 L 1020 190" stroke="#d00" stroke-width="3" fill="none" marker-end="url(#powerarrow)"/>
  <text x="995" y="185" font-size="10" fill="#d00">12V</text>
  
  <!-- To Motor Driver -->
  <path d="M 920 230 L 920 450 L 660 450 L 660 500" stroke="#d00" stroke-width="3" fill="none" marker-end="url(#powerarrow)"/>
  <text x="930" y="340" font-size="11" fill="#d00">12V to Driver</text>
  
  <!-- To ESP32 -->
  <path d="M 1080 220 L 1080 280 L 225 280 L 225 250" stroke="#d00" stroke-width="2.5" fill="none" marker-end="url(#powerarrow)"/>
  <text x="640" y="275" font-size="10" fill="#d00">5V</text>
  
  <!-- To Arduino Mega -->
  <path d="M 1080 280 L 700 280 L 700 590 L 310 590" stroke="#d00" stroke-width="2.5" fill="none" marker-end="url(#powerarrow)"/>
  <text x="500" y="275" font-size="10" fill="#d00">5V to Mega</text>
  
  <!-- Power Notes -->
  <text x="840" y="270" font-size="11" font-weight="bold" fill="#d00">Power Flow:</text>
  <text x="840" y="290" font-size="10" fill="#333">• Battery 12V → Motor Driver (VCC)</text>
  <text x="840" y="308" font-size="10" fill="#333">• Battery 12V → Step-Down → 5V</text>
  <text x="840" y="326" font-size="10" fill="#333">• 5V → ESP32 (VIN)</text>
  <text x="840" y="344" font-size="10" fill="#333">• 5V → Arduino Mega (VIN)</text>
  <text x="840" y="362" font-size="10" fill="#333">• Common GND for all components</text>
  
  <!-- Ground symbol -->
  <text x="840" y="390" font-size="12" font-weight="bold" fill="#333">⏚ GND Common</text>
  
  <!-- Legend -->
  <text x="50" y="860" font-size="14" font-weight="bold" fill="#333">Legend:</text>
  <line x1="130" y1="855" x2="180" y2="855" stroke="#4a90e2" stroke-width="2"/>
  <text x="190" y="860" font-size="11" fill="#333">Data Signal</text>
  
  <line x1="280" y1="855" x2="330" y2="855" stroke="#d00" stroke-width="3"/>
  <text x="340" y="860" font-size="11" fill="#333">Power (12V/5V)</text>
  
  <line x1="450" y1="855" x2="500" y2="855" stroke="#f90" stroke-width="3"/>
  <text x="510" y="860" font-size="11" fill="#333">Serial Communication</text>
</svg>