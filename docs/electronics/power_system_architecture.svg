<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Define arrow markers -->
  <defs>
    <marker id="powerarrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#d00" />
    </marker>
    <marker id="bluearrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#69f" />
    </marker>
    <marker id="greenarrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#4a90e2" />
    </marker>
  </defs>
  
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1000" height="700" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="500" y="40" font-size="32" font-weight="bold" text-anchor="middle" fill="#333">
    🔋 Power System Architecture
  </text>
  <text x="500" y="70" font-size="14" text-anchor="middle" fill="#666">
    توزيع الطاقة من البطارية إلى جميع أجزاء الروبوت
  </text>
  
  <!-- ====== BATTERY (Source) ====== -->
  <rect x="50" y="250" width="200" height="140" fill="#f66" stroke="#333" stroke-width="3" rx="10"/>
  <text x="150" y="290" font-size="20" font-weight="bold" text-anchor="middle" fill="#fff">
    🔋 Battery
  </text>
  <text x="150" y="315" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">
    12V Li-ion
  </text>
  <text x="150" y="340" font-size="13" text-anchor="middle" fill="#fff">
    Main Power Source
  </text>
  <text x="150" y="360" font-size="12" text-anchor="middle" fill="#fff">
    Capacity: 2200-5000mAh
  </text>
  <text x="150" y="378" font-size="11" text-anchor="middle" fill="#fff">
    3S LiPo / Li-ion
  </text>
  
  <!-- Battery terminals -->
  <circle cx="150" cy="250" r="8" fill="#ff0" stroke="#333" stroke-width="2"/>
  <text x="150" y="245" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">+</text>
  <circle cx="150" cy="390" r="8" fill="#000" stroke="#333" stroke-width="2"/>
  <text x="150" y="395" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">-</text>
  
  <!-- ====== MOTOR DRIVER (12V Direct) ====== -->
  <rect x="350" y="120" width="220" height="120" fill="#69f" stroke="#333" stroke-width="3" rx="10"/>
  <text x="460" y="155" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">
    Motor Driver L298N
  </text>
  <text x="460" y="180" font-size="13" text-anchor="middle" fill="#fff">
    12V Direct Input
  </text>
  <text x="460" y="200" font-size="12" text-anchor="middle" fill="#fff">
    VCC: 12V (High Power)
  </text>
  <text x="460" y="218" font-size="11" text-anchor="middle" fill="#fff">
    Controls DC Motors
  </text>
  
  <!-- Battery to Motor Driver -->
  <path d="M 250 280 L 300 280 L 300 180 L 350 180" stroke="#d00" stroke-width="5" fill="none" marker-end="url(#powerarrow)"/>
  <text x="280" y="200" font-size="14" font-weight="bold" fill="#d00">12V Direct</text>
  <text x="280" y="220" font-size="11" fill="#d00">High Current</text>
  
  <!-- ====== STEP-DOWN CONVERTER ====== -->
  <rect x="350" y="310" width="220" height="110" fill="#f96" stroke="#333" stroke-width="3" rx="10"/>
  <text x="460" y="345" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">
    ⚡ Step-Down Converter
  </text>
  <text x="460" y="368" font-size="14" text-anchor="middle" fill="#fff">
    Buck Converter
  </text>
  <text x="460" y="390" font-size="13" text-anchor="middle" fill="#fff">
    Input: 12V → Output: 5V
  </text>
  <text x="460" y="408" font-size="11" text-anchor="middle" fill="#fff">
    Stable Voltage Regulation
  </text>
  
  <!-- Battery to Step-Down -->
  <path d="M 250 320 L 350 365" stroke="#d00" stroke-width="5" fill="none" marker-end="url(#powerarrow)"/>
  <text x="280" y="340" font-size="14" font-weight="bold" fill="#d00">Input 12V</text>
  
  <!-- ====== ARDUINO MEGA ====== -->
  <rect x="680" y="220" width="180" height="100" fill="#69f" stroke="#333" stroke-width="3" rx="10"/>
  <text x="770" y="255" font-size="17" font-weight="bold" text-anchor="middle" fill="#fff">
    Arduino Mega
  </text>
  <text x="770" y="278" font-size="13" text-anchor="middle" fill="#fff">
    5V Input (VIN)
  </text>
  <text x="770" y="298" font-size="11" text-anchor="middle" fill="#fff">
    Motor Control Logic
  </text>
  
  <!-- Step-Down to Arduino -->
  <path d="M 570 345 L 630 345 L 630 270 L 680 270" stroke="#4a90e2" stroke-width="4" fill="none" marker-end="url(#greenarrow)"/>
  <text x="610" y="310" font-size="14" font-weight="bold" fill="#4a90e2">Stable 5V</text>
  
  <!-- ====== ESP32 ====== -->
  <rect x="680" y="360" width="180" height="100" fill="#f96" stroke="#333" stroke-width="3" rx="10"/>
  <text x="770" y="395" font-size="17" font-weight="bold" text-anchor="middle" fill="#fff">
    ESP32
  </text>
  <text x="770" y="418" font-size="13" text-anchor="middle" fill="#fff">
    5V Input (VIN)
  </text>
  <text x="770" y="438" font-size="11" text-anchor="middle" fill="#fff">
    Sensor Processing
  </text>
  
  <!-- Step-Down to ESP32 -->
  <path d="M 570 380 L 680 410" stroke="#4a90e2" stroke-width="4" fill="none" marker-end="url(#greenarrow)"/>
  <text x="610" y="400" font-size="14" font-weight="bold" fill="#4a90e2">Stable 5V</text>
  
  <!-- ====== ULTRASONIC SENSORS ====== -->
  <rect x="680" y="90" width="180" height="80" fill="#dfd" stroke="#333" stroke-width="2" rx="8"/>
  <text x="770" y="120" font-size="15" font-weight="bold" text-anchor="middle" fill="#333">
    Ultrasonic Sensors
  </text>
  <text x="770" y="142" font-size="12" text-anchor="middle" fill="#555">
    5V Power
  </text>
  <text x="770" y="160" font-size="10" text-anchor="middle" fill="#555">
    Obstacle Detection
  </text>
  
  <!-- Arduino to Ultrasonic -->
  <path d="M 770 220 L 770 170" stroke="#4a90e2" stroke-width="3" fill="none" marker-end="url(#greenarrow)"/>
  <text x="785" y="200" font-size="12" font-weight="bold" fill="#4a90e2">5V</text>
  
  <!-- ====== LIDAR SENSOR ====== -->
  <rect x="680" y="510" width="180" height="80" fill="#dfd" stroke="#333" stroke-width="2" rx="8"/>
  <text x="770" y="540" font-size="15" font-weight="bold" text-anchor="middle" fill="#333">
    LiDAR Sensor
  </text>
  <text x="770" y="562" font-size="12" text-anchor="middle" fill="#555">
    3.3V Power
  </text>
  <text x="770" y="580" font-size="10" text-anchor="middle" fill="#555">
    Distance Mapping
  </text>
  
  <!-- ESP32 to LiDAR -->
  <path d="M 770 460 L 770 510" stroke="#9c6" stroke-width="3" fill="none" marker-end="url(#greenarrow)"/>
  <text x="785" y="490" font-size="12" font-weight="bold" fill="#9c6">3.3V</text>
  <text x="715" y="490" font-size="10" fill="#555">(Internal Reg)</text>
  
  <!-- ====== GROUND CONNECTIONS ====== -->
  <line x1="150" y1="400" x2="150" y2="630" stroke="#000" stroke-width="4"/>
  <line x1="50" y1="630" x2="950" y2="630" stroke="#000" stroke-width="4"/>
  <circle cx="460" cy="630" r="6" fill="#000"/>
  <circle cx="770" cy="630" r="6" fill="#000"/>
  <line x1="460" y1="240" x2="460" y2="630" stroke="#000" stroke-width="3"/>
  <line x1="460" y1="420" x2="460" y2="630" stroke="#000" stroke-width="3"/>
  <line x1="770" y1="320" x2="770" y2="630" stroke="#000" stroke-width="3"/>
  <line x1="770" y1="460" x2="770" y2="630" stroke="#000" stroke-width="3"/>
  
  <text x="500" y="650" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">
    ⏚ COMMON GROUND (GND) - All components share ground
  </text>
  
  <!-- ====== POWER SPECIFICATIONS TABLE ====== -->
  <rect x="30" y="480" width="300" height="160" fill="#fff" stroke="#333" stroke-width="2" rx="8"/>
  <text x="180" y="510" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    ⚡ Power Specifications
  </text>
  <line x1="40" y1="520" x2="320" y2="520" stroke="#333" stroke-width="1"/>
  
  <text x="50" y="545" font-size="12" font-weight="bold" fill="#333">Component</text>
  <text x="200" y="545" font-size="12" font-weight="bold" fill="#333">Voltage</text>
  <text x="270" y="545" font-size="12" font-weight="bold" fill="#333">Current</text>
  
  <text x="50" y="565" font-size="11" fill="#333">Motor Driver</text>
  <text x="200" y="565" font-size="11" fill="#d00">12V</text>
  <text x="270" y="565" font-size="11" fill="#333">~2A</text>
  
  <text x="50" y="585" font-size="11" fill="#333">Arduino Mega</text>
  <text x="200" y="585" font-size="11" fill="#4a90e2">5V</text>
  <text x="270" y="585" font-size="11" fill="#333">~200mA</text>
  
  <text x="50" y="605" font-size="11" fill="#333">ESP32</text>
  <text x="200" y="605" font-size="11" fill="#4a90e2">5V</text>
  <text x="270" y="605" font-size="11" fill="#333">~250mA</text>
  
  <text x="50" y="625" font-size="11" fill="#333">Sensors Total</text>
  <text x="200" y="625" font-size="11" fill="#9c6">3.3-5V</text>
  <text x="270" y="625" font-size="11" fill="#333">~100mA</text>
  
  <!-- ====== LEGEND ====== -->
  <rect x="360" y="540" width="200" height="100" fill="#f9f9f9" stroke="#333" stroke-width="2" rx="8"/>
  <text x="460" y="565" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">
    Legend
  </text>
  
  <line x1="375" y1="585" x2="425" y2="585" stroke="#d00" stroke-width="5"/>
  <text x="435" y="590" font-size="11" fill="#333">12V High Power</text>
  
  <line x1="375" y1="605" x2="425" y2="605" stroke="#4a90e2" stroke-width="4"/>
  <text x="435" y="610" font-size="11" fill="#333">5V Regulated</text>
  
  <line x1="375" y1="625" x2="425" y2="625" stroke="#9c6" stroke-width="3"/>
  <text x="435" y="630" font-size="11" fill="#333">3.3V (from ESP32)</text>
  
  <!-- Warning note -->
  <rect x="600" y="545" width="340" height="85" fill="#fff3cd" stroke="#ff9800" stroke-width="2" rx="8"/>
  <text x="770" y="570" font-size="13" font-weight="bold" text-anchor="middle" fill="#ff6600">
    ⚠️ Important Notes
  </text>
  <text x="615" y="590" font-size="10" fill="#333">• Use thick wires for 12V motor power (16-18 AWG)</text>
  <text x="615" y="605" font-size="10" fill="#333">• Add capacitors near each component for stability</text>
  <text x="615" y="620" font-size="10" fill="#333">• Ensure common ground for all components</text>
</svg>